<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Drop Guard landing illustration">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b5d1e" stop-opacity="0.92"/>
      <stop offset="0.55" stop-color="#0f7a2a" stop-opacity="0.90"/>
      <stop offset="1" stop-color="#0a3f16" stop-opacity="0.96"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="22%" r="70%">
      <stop offset="0" stop-color="#c9a227" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="900" rx="40" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="900" rx="40" fill="url(#glow)"/>

  <!-- Floating card -->
  <g filter="url(#shadow)">
    <rect x="140" y="170" width="920" height="560" rx="28" fill="#ffffff" fill-opacity="0.92"/>
  </g>

  <!-- Mini chips -->
  <g>
    <rect x="200" y="210" width="190" height="44" rx="22" fill="#0b5d1e" fill-opacity="0.12" stroke="#0b5d1e" stroke-opacity="0.16"/>
    <circle cx="224" cy="232" r="8" fill="#c9a227"/>
    <text x="242" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#0f1c12" fill-opacity="0.82">Risk overview</text>

    <rect x="410" y="210" width="220" height="44" rx="22" fill="#c9a227" fill-opacity="0.14" stroke="#c9a227" stroke-opacity="0.20"/>
    <circle cx="434" cy="232" r="8" fill="#0f7a2a"/>
    <text x="452" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#0f1c12" fill-opacity="0.82">Follow-up tracking</text>
  </g>

  <!-- Simple chart blocks -->
  <g>
    <rect x="210" y="290" width="430" height="190" rx="18" fill="#0b5d1e" fill-opacity="0.06" stroke="#0b5d1e" stroke-opacity="0.12"/>
    <rect x="230" y="320" width="120" height="18" rx="9" fill="#0f1c12" fill-opacity="0.55"/>
    <rect x="230" y="350" width="260" height="12" rx="6" fill="#0f1c12" fill-opacity="0.20"/>
    <rect x="230" y="370" width="220" height="12" rx="6" fill="#0f1c12" fill-opacity="0.18"/>
    <rect x="230" y="390" width="240" height="12" rx="6" fill="#0f1c12" fill-opacity="0.16"/>

    <rect x="230" y="430" width="70" height="36" rx="10" fill="#0f7a2a" fill-opacity="0.35"/>
    <rect x="315" y="410" width="70" height="56" rx="10" fill="#c9a227" fill-opacity="0.40"/>
    <rect x="400" y="395" width="70" height="71" rx="10" fill="#0f7a2a" fill-opacity="0.50"/>
    <rect x="485" y="420" width="70" height="46" rx="10" fill="#c9a227" fill-opacity="0.34"/>
  </g>

  <g>
    <rect x="670" y="290" width="330" height="440" rx="18" fill="#0b5d1e" fill-opacity="0.06" stroke="#0b5d1e" stroke-opacity="0.12"/>
    <rect x="690" y="320" width="160" height="18" rx="9" fill="#0f1c12" fill-opacity="0.55"/>
    <rect x="690" y="352" width="270" height="12" rx="6" fill="#0f1c12" fill-opacity="0.18"/>
    <rect x="690" y="372" width="230" height="12" rx="6" fill="#0f1c12" fill-opacity="0.16"/>
    <rect x="690" y="410" width="290" height="76" rx="16" fill="#ffffff" fill-opacity="0.85" stroke="#0b5d1e" stroke-opacity="0.10"/>
    <rect x="710" y="432" width="190" height="12" rx="6" fill="#0f1c12" fill-opacity="0.18"/>
    <rect x="710" y="452" width="250" height="12" rx="6" fill="#0f1c12" fill-opacity="0.14"/>

    <rect x="690" y="510" width="290" height="76" rx="16" fill="#ffffff" fill-opacity="0.85" stroke="#0b5d1e" stroke-opacity="0.10"/>
    <rect x="710" y="532" width="150" height="12" rx="6" fill="#0f1c12" fill-opacity="0.18"/>
    <rect x="710" y="552" width="235" height="12" rx="6" fill="#0f1c12" fill-opacity="0.14"/>

    <rect x="690" y="610" width="290" height="76" rx="16" fill="#ffffff" fill-opacity="0.85" stroke="#0b5d1e" stroke-opacity="0.10"/>
    <rect x="710" y="632" width="170" height="12" rx="6" fill="#0f1c12" fill-opacity="0.18"/>
    <rect x="710" y="652" width="220" height="12" rx="6" fill="#0f1c12" fill-opacity="0.14"/>
  </g>
</svg>
