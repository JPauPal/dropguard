# Drop Guard — Apache site for edudropguard.com
# Install on Ubuntu VPS:
#   1. Upload project to /var/www/edudropguard (app/, public/, storage/, .env, etc.)
#   2. sudo cp deploy/apache-edudropguard.conf /etc/apache2/sites-available/edudropguard.conf
#   3. sudo a2enmod rewrite
#   4. sudo a2ensite edudropguard.conf
#   5. sudo a2dissite 000-default.conf   # optional: stop serving the Ubuntu default page
#   6. sudo apachectl configtest && sudo systemctl reload apache2
#   7. sudo apt install certbot python3-certbot-apache
#   8. sudo certbot --apache -d edudropguard.com -d www.edudropguard.com

<VirtualHost *:80>
    ServerName edudropguard.com
    ServerAlias www.edudropguard.com

    DocumentRoot /var/www/edudropguard/public

    <Directory /var/www/edudropguard/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/edudropguard-error.log
    CustomLog ${APACHE_LOG_DIR}/edudropguard-access.log combined
</VirtualHost>
